<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Report — CoachLog</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    
    <!-- 🚀 TAMBAHKAN 4 BARIS INI AGAR FULL-SCREEN APLIKASI DI HP -->
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CoachLog">
</head>
<body>

    <!-- SIDEBAR NAVIGATION -->
    <div class="sidebar">
        <div>
            <div class="brand">
                <i class='bx bx-dumbbell'></i>
                <span>CoachLog.</span>
            </div>
            <ul class="menu-list">
                <li>
                    <a href="index.html" class="menu-item">
                        <i class='bx bx-edit-alt'></i>
                        <span>Input Program</span>
                    </a>
                </li>
                <li>
                    <a href="riwayat.html" class="menu-item">
                        <i class='bx bx-history'></i>
                        <span>Daftar Program</span>
                    </a>
                </li>
                <li>
                    <a href="klien.html" class="menu-item active">
                        <i class='bx bx-group'></i>
                        <span>Daftar Klien</span>
                    </a>
                </li>
                <li>
                    <a href="pengaturan.html" class="menu-item">
                        <i class='bx bx-cog'></i>
                        <span>Pengaturan</span>
                    </a>
                </li>
            </ul>
        </div>
        <div class="user-profile">
            <i class='bx bxs-user-circle'></i>
            <div class="user-info">
                <h4>Head Coach</h4>
                <p>Internal Operator</p>
            </div>
        </div>
    </div>

    <!-- MAIN APP CONTENT -->
    <div class="main-content">
        <div class="page-header" style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h2>Daftar Klien</h2>
                <p>Kelola data profil, fisik, dan target kebugaran member/klien kamu.</p>
            </div>
            <button type="button" class="btn-submit" onclick="bukaModalKlien()" style="background-color: #10b981; width: auto; padding: 10px 20px;">
                <i class='bx bx-user-plus'></i> Tambah Klien
            </button>
        </div>

        <div class="panel">
            <div style="overflow-x: auto;">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Nama</th>
                            <th>No WA</th>
                            <th>Fisik (TB/BB/Umur)</th>
                            <th>Target</th>
                            <th>Status</th>
                            <th style="text-align: center; width: 150px;">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="clients-body">
                        <!-- Data Klien akan dirender via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- MODAL POPUP: FORM KLIEN (TAMBAH & EDIT) -->
    <div id="klienModal" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
                <h3 id="klien-modal-title">Tambah Klien Baru</h3>
                <span class="close-modal" onclick="tutupModalKlien()">&times;</span>
            </div>
            <form id="form-klien" onsubmit="simpanDataKlien(event)">
                <input type="hidden" id="klien-id-edit">
                <div class="modal-body" style="display: flex; flex-direction: column; gap: 12px;">
                    <div>
                        <label style="font-weight: 500; display:block; margin-bottom:4px;">Nama Lengkap</label>
                        <input type="text" id="klien-nama" required style="width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:6px;">
                    </div>
                    <div>
                        <label style="font-weight: 500; display:block; margin-bottom:4px;">Nomor WA (Contoh: 08123xxx)</label>
                        <input type="text" id="klien-wa" required style="width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:6px;">
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <div style="flex: 1;">
                            <label style="font-weight: 500; display:block; margin-bottom:4px;">Tinggi (cm)</label>
                            <input type="number" id="klien-tinggi" required style="width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:6px;">
                        </div>
                        <div style="flex: 1;">
                            <label style="font-weight: 500; display:block; margin-bottom:4px;">Berat (kg)</label>
                            <input type="number" id="klien-berat" required style="width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:6px;">
                        </div>
                        <div style="flex: 1;">
                            <label style="font-weight: 500; display:block; margin-bottom:4px;">Umur (thn)</label>
                            <input type="number" id="klien-umur" required style="width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:6px;">
                        </div>
                    </div>
                    <div>
                        <label style="font-weight: 500; display:block; margin-bottom:4px;">Target / Goals</label>
                        <input type="text" id="klien-target" placeholder="Misal: Fat Loss / Bulking" required style="width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:6px;">
                    </div>
                    <div>
                        <label style="font-weight: 500; display:block; margin-bottom:4px;">Status Keanggotaan</label>
                        <select id="klien-status" style="width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:6px;">
                            <option value="Aktif">Aktif</option>
                            <option value="Non-Aktif">Non-Aktif</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-submit" style="margin-top: 10px; background-color: #10b981;">Simpan Data</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
